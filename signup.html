<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Tequila POS</title>
    
    <!-- Load theme.js early to prevent theme flash -->
    <script src="/assets/js/theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- Custom theme Tailwind setup -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              roboto: ['Roboto', 'sans-serif'],
            },
            colors: {
              brand: {
                primary: '#087EB1',
                darkPrimary: '#055073',
                accent: '#c98633',
                bgLight: '#F8F9FA',
                bgDark: '#121212',
                cardDark: '#1c1c1c',
              }
            }
          }
        }
      }
    </script>
    
    <style>
      body {
        font-family: 'Roboto', sans-serif;
      }
      /* Theme transitions */
      body, input, button {
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      }
    </style>
  </head>
  <body class="bg-brand-bgLight text-gray-900 dark:bg-brand-bgDark dark:text-gray-100 min-h-screen">
    
    <div class="grid grid-cols-1 md:grid-cols-2 min-h-screen">
      
      <!-- Left Panel: Brand image overlay (hidden on mobile) -->
      <div class="hidden md:block relative overflow-hidden">
        <img
          src="/assets/images/home/market-we-cater.png"
          alt="Retail POS Setup"
          class="absolute inset-0 w-full h-full object-cover"
        />
        <!-- Custom blue-teal gradient overlay matching tequilapos.net -->
        <div class="absolute inset-0 bg-gradient-to-br from-brand-primary/90 to-brand-darkPrimary/95 flex flex-col justify-center px-16 py-12 text-white">
          <div class="max-w-md">
            <h1 class="text-4xl lg:text-5xl font-bold mb-6 leading-tight">
              Get started today!
            </h1>
            <p class="text-base lg:text-lg leading-relaxed text-gray-100 font-medium">
              Start accepting payments, tracking real-time stock levels, and engaging your customers with the most reliable POS solution tailored for your business.
            </p>
          </div>
        </div>
      </div>
      
      <!-- Right Panel: Form Card -->
      <div class="flex flex-col justify-center items-center px-6 py-8 md:px-12 lg:px-20 relative">
        <!-- Floating Home Link -->
        <a
          href="/index.html"
          class="absolute top-6 right-6 text-sm font-semibold text-gray-500 hover:text-brand-primary dark:text-gray-400 dark:hover:text-white flex items-center gap-1 transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
          </svg>
          Back to Home
        </a>
        
        <div class="w-full max-w-md space-y-6">
          <!-- TequilaPOS Logo -->
          <div class="flex flex-col items-center">
            <a href="/index.html" class="block">
              <img
                src="/assets/images/logo/tequila_pos_logo_transparent.png"
                alt="Tequila POS Logo"
                class="h-16 w-auto block dark:hidden"
              />
              <img
                src="/assets/images/logo/tequila_pos_logo_transparent 1-dark.png"
                alt="Tequila POS Logo"
                class="h-16 w-auto hidden dark:block"
              />
            </a>
          </div>
          
          <div class="text-left">
            <h2 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white">
              Create Account
            </h2>
          </div>
          
          <form class="space-y-4" onsubmit="handleSignup(event)">
            <!-- First Name / Last Name Row -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label for="firstName" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">
                  First Name
                </label>
                <input
                  id="firstName"
                  name="firstName"
                  type="text"
                  required
                  placeholder="John"
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-primary/50 focus:border-brand-primary dark:bg-brand-cardDark dark:border-gray-700 dark:text-white dark:placeholder-gray-500"
                />
              </div>
              <div>
                <label for="lastName" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">
                  Last Name
                </label>
                <input
                  id="lastName"
                  name="lastName"
                  type="text"
                  required
                  placeholder="Doe"
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-primary/50 focus:border-brand-primary dark:bg-brand-cardDark dark:border-gray-700 dark:text-white dark:placeholder-gray-500"
                />
              </div>
            </div>

            <div>
              <label for="phone" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">
                Phone Number
              </label>
              <input
                id="phone"
                name="phone"
                type="tel"
                required
                placeholder="Enter Phone Number"
                class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-primary/50 focus:border-brand-primary dark:bg-brand-cardDark dark:border-gray-700 dark:text-white dark:placeholder-gray-500"
              />
            </div>
            
            <div>
              <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">
                Email address
              </label>
              <input
                id="email"
                name="email"
                type="email"
                required
                placeholder="Enter Your Email"
                class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-primary/50 focus:border-brand-primary dark:bg-brand-cardDark dark:border-gray-700 dark:text-white dark:placeholder-gray-500"
              />
            </div>
            
            <div>
              <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">
                Password
              </label>
              <div class="relative">
                <input
                  id="password"
                  name="password"
                  type="password"
                  required
                  placeholder="Create Password"
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-primary/50 focus:border-brand-primary dark:bg-brand-cardDark dark:border-gray-700 dark:text-white dark:placeholder-gray-500"
                />
                <button
                  type="button"
                  onclick="togglePasswordVisibility('password')"
                  class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"
                >
                  <svg id="eye-icon-password" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                </button>
              </div>
            </div>

            <div>
              <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">
                Confirm Password
              </label>
              <div class="relative">
                <input
                  id="confirmPassword"
                  name="confirmPassword"
                  type="password"
                  required
                  placeholder="Confirm Password"
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-primary/50 focus:border-brand-primary dark:bg-brand-cardDark dark:border-gray-700 dark:text-white dark:placeholder-gray-500"
                />
                <button
                  type="button"
                  onclick="togglePasswordVisibility('confirmPassword')"
                  class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"
                >
                  <svg id="eye-icon-confirmPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                </button>
              </div>
            </div>
            
            <div class="flex items-start text-sm">
              <label class="flex items-start cursor-pointer">
                <input
                  type="checkbox"
                  required
                  class="mt-1 h-4 w-4 rounded border-gray-300 text-brand-primary focus:ring-brand-primary dark:bg-brand-cardDark dark:border-gray-700"
                />
                <span class="ml-2 text-gray-600 dark:text-gray-400 font-medium">
                  I agree to the <a href="#" class="text-brand-primary hover:underline">Terms of Service</a> and <a href="#" class="text-brand-primary hover:underline">Privacy Policy</a>
                </span>
              </label>
            </div>
            
            <button
              type="submit"
              class="w-full py-3 px-4 rounded-lg bg-brand-primary text-white font-bold hover:bg-brand-darkPrimary hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-brand-primary focus:ring-offset-2 active:scale-[0.98] transition-all"
            >
              Sign Up
            </button>
          </form>
          
          <div class="text-center text-sm text-gray-600 dark:text-gray-400">
            <span>Already have an account? </span>
            <a
              href="/login.html"
              class="font-bold text-brand-primary hover:text-brand-darkPrimary transition-colors"
            >
              Log In
            </a>
          </div>
          
        </div>
      </div>
      
    </div>

    <script>
      function togglePasswordVisibility(id) {
        const input = document.getElementById(id);
        const icon = document.getElementById('eye-icon-' + id);
        if (input.type === 'password') {
          input.type = 'text';
          icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.815 7.815L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
        } else {
          input.type = 'password';
          icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
        }
      }

      function handleSignup(event) {
        event.preventDefault();
        const pwd = document.getElementById('password').value;
        const confirmPwd = document.getElementById('confirmPassword').value;
        if (pwd !== confirmPwd) {
          alert('Passwords do not match!');
          return;
        }
        alert('TequilaPOS Demo Registration Successful!');
        window.location.href = '/login.html';
      }
    </script>
  </body>
</html>
